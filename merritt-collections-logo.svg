<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C47A;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#F5E8C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5E8C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="260" fill="url(#darkBg)" rx="4"/>

  <!-- Outer decorative border -->
  <rect x="14" y="14" width="572" height="232" fill="none" stroke="url(#goldGrad2)" stroke-width="0.5" rx="2"/>
  <rect x="18" y="18" width="564" height="224" fill="none" stroke="url(#goldGrad2)" stroke-width="0.25" opacity="0.4" rx="1"/>

  <!-- Corner ornaments - top left -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <path d="M14,34 L14,14 L34,14"/>
    <path d="M19,34 L19,19 L34,19"/>
  </g>
  <!-- Corner ornaments - top right -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <path d="M566,34 L566,14 L586,14"/>
    <path d="M566,19 L581,19 L581,34"/>
  </g>
  <!-- Corner ornaments - bottom left -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <path d="M14,226 L14,246 L34,246"/>
    <path d="M19,226 L19,241 L34,241"/>
  </g>
  <!-- Corner ornaments - bottom right -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <path d="M566,226 L566,246 L586,246"/>
    <path d="M566,241 L581,241 L581,226"/>
  </g>

  <!-- Central monogram emblem -->
  <!-- Diamond frame -->
  <g transform="translate(300, 85)">
    <!-- Outer diamond -->
    <polygon points="0,-46 40,0 0,46 -40,0" fill="none" stroke="url(#goldGrad)" stroke-width="1" filter="url(#subtleGlow)"/>
    <!-- Inner diamond -->
    <polygon points="0,-38 33,0 0,38 -33,0" fill="none" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.5"/>
    <!-- Subtle fill -->
    <polygon points="0,-44 38,0 0,44 -38,0" fill="#C9A84C" opacity="0.04"/>

    <!-- Diamond corner dots -->
    <circle cx="0" cy="-46" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)"/>
    <circle cx="40" cy="0" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)"/>
    <circle cx="0" cy="46" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)"/>
    <circle cx="-40" cy="0" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)"/>

    <!-- Monogram M C interlocked -->
    <!-- M -->
    <text x="-13" y="10" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, serif"
          font-size="36" font-weight="400" fill="url(#goldGrad)"
          text-anchor="middle" filter="url(#subtleGlow)" letter-spacing="-1">M</text>
    <!-- C -->
    <text x="13" y="10" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, serif"
          font-size="36" font-weight="400" fill="url(#goldGrad)"
          text-anchor="middle" filter="url(#subtleGlow)" opacity="0.85" letter-spacing="-1">C</text>

    <!-- Small horizontal ornament lines flanking diamond -->
    <line x1="-68" y1="0" x2="-46" y2="0" stroke="url(#goldGrad2)" stroke-width="0.8"/>
    <line x1="46" y1="0" x2="68" y2="0" stroke="url(#goldGrad2)" stroke-width="0.8"/>
    <circle cx="-72" cy="0" r="1.5" fill="#C9A84C"/>
    <circle cx="72" cy="0" r="1.5" fill="#C9A84C"/>
  </g>

  <!-- THE -->
  <text x="300" y="158"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="11" font-weight="400" fill="#C9A84C"
        text-anchor="middle" letter-spacing="8"
        style="font-variant: small-caps;">THE</text>

  <!-- MERRITT -->
  <text x="300" y="185"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="34" font-weight="400" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="10"
        filter="url(#subtleGlow)">MERRITT</text>

  <!-- Thin decorative rule under MERRITT -->
  <line x1="120" y1="193" x2="480" y2="193" stroke="url(#goldGrad2)" stroke-width="0.5"/>

  <!-- Diamond ornament center of rule -->
  <polygon points="300,189 304,193 300,197 296,193" fill="#C9A84C"/>

  <!-- COLLECTIONS -->
  <text x="300" y="215"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="13.5" font-weight="400" fill="#C9A84C"
        text-anchor="middle" letter-spacing="12"
        opacity="0.9">COLLECTIONS</text>

  <!-- Tagline -->
  <text x="300" y="236"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="8.5" font-weight="300" fill="#888880"
        text-anchor="middle" letter-spacing="4"
        font-style="italic">Premium Property Management</text>
</svg>
