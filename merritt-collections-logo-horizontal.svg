<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C47A"/>
      <stop offset="45%" style="stop-color:#C9A84C"/>
      <stop offset="75%" style="stop-color:#F5E8C8"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <linearGradient id="goldLineH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#F5E8C8"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </linearGradient>
    <filter id="glowH">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background transparent -->
  <rect width="520" height="80" fill="#0A0A0A" rx="3"/>

  <!-- Diamond monogram emblem -->
  <g transform="translate(46, 40)">
    <polygon points="0,-24 20,0 0,24 -20,0" fill="none" stroke="url(#goldH)" stroke-width="0.9" filter="url(#glowH)"/>
    <polygon points="0,-19 16,0 0,19 -16,0" fill="none" stroke="url(#goldH)" stroke-width="0.35" opacity="0.4"/>
    <circle cx="0" cy="-24" r="1.4" fill="#C9A84C"/>
    <circle cx="20" cy="0" r="1.4" fill="#C9A84C"/>
    <circle cx="0" cy="24" r="1.4" fill="#C9A84C"/>
    <circle cx="-20" cy="0" r="1.4" fill="#C9A84C"/>
    <!-- MC inside diamond -->
    <text x="-5" y="6" font-family="'Palatino Linotype', Palatino, Georgia, serif"
          font-size="19" fill="url(#goldH)" text-anchor="middle" filter="url(#glowH)">M</text>
    <text x="7" y="6" font-family="'Palatino Linotype', Palatino, Georgia, serif"
          font-size="19" fill="url(#goldH)" text-anchor="middle" opacity="0.8">C</text>
  </g>

  <!-- Vertical separator line -->
  <line x1="80" y1="16" x2="80" y2="64" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>

  <!-- Text group -->
  <g transform="translate(96, 0)">
    <!-- THE -->
    <text x="0" y="27" font-family="'Palatino Linotype', Palatino, Georgia, serif"
          font-size="8" fill="#C9A84C" letter-spacing="5" opacity="0.9">THE</text>

    <!-- MERRITT -->
    <text x="-1" y="52" font-family="'Palatino Linotype', Palatino, Georgia, serif"
          font-size="26" fill="url(#goldH)" letter-spacing="7"
          filter="url(#glowH)">MERRITT</text>

    <!-- Thin line under MERRITT -->
    <line x1="0" y1="57" x2="330" y2="57" stroke="url(#goldLineH)" stroke-width="0.5"/>

    <!-- COLLECTIONS -->
    <text x="0" y="70" font-family="'Palatino Linotype', Palatino, Georgia, serif"
          font-size="10" fill="#C9A84C" letter-spacing="9" opacity="0.85">COLLECTIONS</text>
  </g>
</svg>
